# Herdr-only Ghostty profile snapshot.
# Active file: ~/.config/ghostty/herdr

# Optional macOS Dock/app-switcher icon customization:
# macos-icon = holographic
# macos-icon = custom
# macos-custom-icon = /Users/gustavocaiano/.config/ghostty/Herdr.icns

keybind = super+n=text:\x02n
keybind = super+t=text:\x02c
keybind = super+d=text:\x02v
keybind = super+shift+d=text:\x02-
keybind = super+w=text:\x02x

# workspace navigation
keybind = super+arrow_up=csi:1;5A
keybind = super+arrow_down=csi:1;5B

# tab/surface navigation
keybind = super+arrow_left=csi:1;5D
keybind = super+arrow_right=csi:1;5C

# pane focus
keybind = ctrl+arrow_up=esc:k
keybind = ctrl+arrow_down=esc:j
keybind = ctrl+arrow_left=esc:h
keybind = ctrl+arrow_right=esc:l
